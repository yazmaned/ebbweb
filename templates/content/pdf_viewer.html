{% extends 'base.html' %}
{% load static %}

{% block title %}{{ material.title }}{% endblock %}

{% block content %}
<div id="controls" style="margin-bottom: 1rem; display: flex; align-items: center; gap: 1rem;">
    <a href="/dashboard/" class="btn"><img src="{% static 'images/icons/arrow-left.svg' %}" width="30" height="30" style="filter: brightness(0) invert(1)"></a>
    <h2>{{ material.title }}</h2>
    <div style="margin-left:auto; display:flex; align-items:center; gap:0.5rem;">
        <button class="btn" id="prev">←</button>
        <span id="page-info" style="color:#888; font-size:0.85rem;"></span>
        <button class="btn" id="next">→</button>
        <button class="btn" id="fullscreen">⛶ Tam Ekran</button>
        <a href="/file/{{ material.pk }}/" target="_blank" class="btn"><img src="{% static 'images/icons/printing-page.svg' %}" width="24" height="24" style="filter: brightness(0) invert(1)"></a>
    </div>
</div>

<div id="pdf-wrapper" style="display:flex; flex-direction:column; align-items:center; background:#757575; border-radius:8px;">
    <canvas id="pdf-canvas" style="width:100%; border-radius:8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);"></canvas>
    <div id="fs-controls" style="display:none; gap:1rem; align-items:center; padding:1rem;">
        <button class="btn" id="fs-prev">←</button>
        <span id="fs-page-info" style="color:#fff; font-size:0.85rem;"></span>
        <button class="btn" id="fs-next">→</button>
         <button class="btn" id="zoom-out">－</button>
        <span id="zoom-level" style="color:#fff; font-size:0.85rem;">100%</span>
        <button class="btn" id="zoom-in">＋</button>
        <button class="btn" id="fs-exit">✕</button>
    </div>
</div>

<style>
    @media (max-width: 768px) {
        #controls {
            flex-wrap: wrap;
            gap: 0.4rem;
        }
        #controls h2 {
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 120px;
        }
        #controls .btn {
            padding: 0.4rem 0.7rem;
            font-size: 0.8rem;
        }
    }
    #pdf-wrapper:fullscreen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #222;
        padding: 1rem;
    }
    #pdf-wrapper:fullscreen canvas {
        max-height: 85vh;
        max-width: 100%;
        width: auto !important;
        height: auto;
        object-fit: contain;
    }
    #pdf-wrapper:fullscreen #fs-controls {
        display: flex !important;
    }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const url = "{{ signed_url|default:material.file.url }}";
    const canvas = document.getElementById('pdf-canvas');
    const ctx = canvas.getContext('2d');
    let pdfDoc = null;
    let currentPage = 1;

    async function renderPage(num) {
        const page = await pdfDoc.getPage(num);
        const viewport = page.getViewport({ scale: 1.5 });
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        await page.render({ canvasContext: ctx, viewport }).promise;
        document.getElementById('page-info').textContent = `Page ${num} of ${pdfDoc.numPages}`;
        document.getElementById('fs-page-info').textContent = `Page ${num} of ${pdfDoc.numPages}`;
    }

    pdfjsLib.getDocument(url).promise.then(doc => {
        pdfDoc = doc;
        renderPage(currentPage);
    });

    document.getElementById('prev').addEventListener('click', () => {
        if (currentPage > 1) { currentPage--; renderPage(currentPage); }
    });

    document.getElementById('next').addEventListener('click', () => {
        if (currentPage < pdfDoc.numPages) { currentPage++; renderPage(currentPage); }
    });

    document.getElementById('fs-prev').addEventListener('click', () => {
        if (currentPage > 1) { currentPage--; renderPage(currentPage); }
    });

    document.getElementById('fs-next').addEventListener('click', () => {
        if (currentPage < pdfDoc.numPages) { currentPage++; renderPage(currentPage); }
    });

    document.getElementById('fullscreen').addEventListener('click', () => {
        const wrapper = document.getElementById('pdf-wrapper');
        if (wrapper.requestFullscreen) wrapper.requestFullscreen();
        else if (wrapper.webkitRequestFullscreen) wrapper.webkitRequestFullscreen();
    });

    document.getElementById('fs-exit').addEventListener('click', () => {
        document.exitFullscreen();
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
            if (currentPage < pdfDoc.numPages) { currentPage++; renderPage(currentPage); }
        }
        if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
            if (currentPage > 1) { currentPage--; renderPage(currentPage); }
        }
    });

    canvas.addEventListener('contextmenu', e => e.preventDefault());
</script>
{% endblock %}
